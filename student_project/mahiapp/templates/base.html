{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StudentHub — Manage student registrations with ease.">
    <title>{% block title %}StudentHub{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="page-wrapper">

        <nav class="navbar">
            <a href="/dashboard/" class="navbar-brand">
                <div class="brand-icon">🎓</div>
                <span class="brand-name">StudentHub</span>
            </a>
            <div class="navbar-links">
                <a href="/" id="nav-login" {% block nav_login %}{% endblock %}>Login</a>
                <a href="/register/" id="nav-register" {% block nav_register %}{% endblock %}>Register</a>
                <a href="/dashboard/" id="nav-dashboard" {% block nav_dashboard %}{% endblock %}>Dashboard</a>
            </div>
        </nav>

        {% block content %}{% endblock %}

    </div>
</body>

</html>
